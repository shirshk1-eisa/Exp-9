name: CI/CD Pipeline

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: devdeploy-dashboard
      DOCKER_LOGIN_USERNAME: ${{ secrets.DOCKER_NAME }}
      DOCKER_LOGIN_PASSWORD: ${{ secrets.DOCKER_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build React App
        run: |
          cd frontend
          npm run build

      - name: Build Docker Image
        run: docker build -f docker/Dockerfile -t $IMAGE_NAME .

      # 🔥 Always try login (no if condition)
      - name: Login to Docker Hub
        run: echo "$DOCKER_LOGIN_PASSWORD" | docker login -u "$DOCKER_LOGIN_USERNAME" --password-stdin

      - name: Tag Image
        run: docker tag $IMAGE_NAME $DOCKER_LOGIN_USERNAME/$IMAGE_NAME:latest

      - name: Push Image
        run: docker push $DOCKER_LOGIN_USERNAME/$IMAGE_NAME:latest

      - name: Done
        run: echo "Deployment Complete 🚀"